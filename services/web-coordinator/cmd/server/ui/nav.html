{{define "nav-css"}}
<style>
  #site-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 48px;
    gap: 0;
  }
  #site-nav .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-right: 12px;
    transition: background .4s, box-shadow .4s;
    /* amber until first health check completes */
    background: var(--yellow); box-shadow: 0 0 6px var(--yellow);
  }
  #site-nav .dot.ok    { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  #site-nav .dot.error { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  #site-nav .brand {
    color: var(--text); text-decoration: none;
    font-size: 15px; font-weight: 600; letter-spacing: .3px;
    white-space: nowrap; margin-right: 20px;
  }
  #site-nav .brand:hover { opacity: .85; }
  #site-nav .nav-links { display: flex; gap: 2px; }
  #site-nav .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  #site-nav .nav-links a:hover { color: var(--text); background: rgba(255,255,255,.05); }
  #site-nav .nav-links a.active { color: var(--text); background: rgba(255,255,255,.08); }
  #site-nav .nav-right {
    margin-left: auto;
    font-size: 12px; color: var(--muted);
  }
</style>
{{end}}

{{define "nav"}}
<header id="site-nav">
  <div class="dot" id="health-dot" title="System health"></div>
  <a class="brand" href="/ui/">Web Security Scanner</a>
  <div class="nav-links">
    <a href="/ui/"{{if eq .ActivePage "jobs"}} class="active"{{end}}>Jobs</a>
    <a href="/ui/targets.html"{{if eq .ActivePage "targets"}} class="active"{{end}}>Targets</a>
  </div>
  <div class="nav-right"><span id="last-refresh"></span></div>
</header>
<script>
(function () {
  const dot = document.getElementById('health-dot');
  const INTERVAL = 30_000;

  async function check() {
    try {
      const r = await fetch('/health', { cache: 'no-store' });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        dot.className = 'dot ok';
        dot.title = 'Healthy';
      } else {
        dot.className = 'dot error';
        dot.title = 'Unhealthy: ' + (data.error || r.status);
      }
    } catch {
      dot.className = 'dot error';
      dot.title = 'Unreachable';
    }
  }

  check();
  setInterval(check, INTERVAL);
})();
</script>
{{end}}
