{{define "nav-css"}}
<style>
  #site-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 48px;
    gap: 0;
  }
  #site-nav .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    flex-shrink: 0; margin-right: 12px;
  }
  #site-nav .brand {
    color: var(--text); text-decoration: none;
    font-size: 15px; font-weight: 600; letter-spacing: .3px;
    white-space: nowrap; margin-right: 20px;
  }
  #site-nav .brand:hover { opacity: .85; }
  #site-nav .nav-links { display: flex; gap: 2px; }
  #site-nav .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  #site-nav .nav-links a:hover { color: var(--text); background: rgba(255,255,255,.05); }
  #site-nav .nav-links a.active { color: var(--text); background: rgba(255,255,255,.08); }
  #site-nav .nav-right {
    margin-left: auto;
    font-size: 12px; color: var(--muted);
  }
</style>
{{end}}

{{define "nav"}}
<header id="site-nav">
  <div class="dot"></div>
  <a class="brand" href="/ui/">Web Security Scanner</a>
  <div class="nav-links">
    <a href="/ui/"{{if eq .ActivePage "jobs"}} class="active"{{end}}>Jobs</a>
    <a href="/ui/targets.html"{{if eq .ActivePage "targets"}} class="active"{{end}}>Targets</a>
  </div>
  <div class="nav-right"><span id="last-refresh"></span></div>
</header>
{{end}}
