<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Detail — Web Security Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --text:     #e2e4ed;
    --muted:    #7a7f99;
    --accent:   #5b8dee;
    --green:    #3ecf8e;
    --red:      #e05c6a;
    --yellow:   #f0b429;
    --purple:   #a78bfa;
    --radius:   8px;
    --mono:     'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }


  main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  a.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 18px;
  }
  a.back-link:hover { color: var(--text); }
  a.back-link::before { content: '←'; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .job-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .job-header-main { flex: 1; min-width: 0; }
  .job-url {
    font-family: var(--mono);
    font-size: 15px;
    word-break: break-all;
    margin-bottom: 4px;
  }
  .job-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--muted);
    font-size: 12px;
    margin-top: 12px;
  }
  .job-meta span { display: flex; gap: 5px; }
  .job-meta strong { color: var(--text); font-weight: 500; }

  .job-tools { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  .tool-card {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
  }
  .tool-card .tool-name {
    font-weight: 700;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: .5px;
  }
  .tool-name-crawl  { color: var(--accent); }
  .tool-name-zap    { color: var(--yellow); }
  .tool-name-nuclei { color: var(--purple); }

  .tool-dl {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    line-height: 1;
    padding: 0 2px;
    margin-left: 2px;
  }
  .tool-dl:hover { color: var(--accent); }

  .job-error {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(224,92,106,.08);
    border: 1px solid rgba(224,92,106,.25);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--red);
    word-break: break-all;
  }

  .job-actions { display: flex; gap: 8px; flex-shrink: 0; }

  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost    { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-danger   { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-sm       { padding: 5px 12px; font-size: 12px; font-weight: 500; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .badge-running  { color: var(--accent); background: rgba(91,141,238,.12); }
  .badge-complete { color: var(--green);  background: rgba(62,207,142,.12); }
  .badge-failed   { color: var(--red);    background: rgba(224,92,106,.12); }
  .badge-pending  { color: var(--muted);  background: rgba(122,127,153,.12); }

  .tool-status-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: .3px;
  }
  .tsb-complete { color: var(--green);  background: rgba(62,207,142,.12); }
  .tsb-failed   { color: var(--red);    background: rgba(224,92,106,.12); }
  .tsb-running  { color: var(--accent); background: rgba(91,141,238,.12); }
  .tsb-pending  { color: var(--muted);  background: rgba(122,127,153,.12); }

  /* Findings table */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .section-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
  }
  .section-header .count {
    background: var(--border);
    border-radius: 12px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    font-size: 13px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .sev {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .sev-critical { background: rgba(224,92,106,.25);  color: #ff8090; }
  .sev-high     { background: rgba(240,130,30,.20);  color: #f08020; }
  .sev-medium   { background: rgba(240,180,41,.15);  color: var(--yellow); }
  .sev-low      { background: rgba(62,207,142,.12);  color: var(--green); }
  .sev-info     { background: rgba(122,127,153,.12); color: var(--muted); }

  .url-mono {
    font-family: var(--mono);
    font-size: 11px;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: block;
  }
  .desc-cell { max-width: 300px; font-size: 12px; color: var(--muted); }
  .evidence-cell { max-width: 200px; font-size: 11px; font-family: var(--mono); color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Finding details panel */
  .detail-panel {
    padding: 14px 16px;
    background: rgba(0,0,0,.25);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .detail-row    { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .detail-col    { display: flex; flex-direction: column; gap: 4px; }
  .detail-label  {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--muted); min-width: 90px; flex-shrink: 0;
  }
  .detail-text   { font-size: 12px; color: var(--text); line-height: 1.6; }
  .detail-kv     { font-size: 12px; color: var(--muted); }
  .detail-kv code {
    font-family: var(--mono); font-size: 11px; color: var(--text);
    background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 3px;
  }
  .detail-code {
    font-family: var(--mono); font-size: 11px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px;
    white-space: pre-wrap; word-break: break-all;
    max-height: 220px; overflow-y: auto; color: var(--text); margin-top: 2px;
  }
  .tag-pill {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 3px;
    background: rgba(91,141,238,.12); color: var(--accent); margin-right: 3px;
  }
  .copy-btn {
    cursor: pointer; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 10px; padding: 1px 6px; border-radius: 3px;
    margin-left: 8px;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--text); }
  .expand-btn {
    cursor: pointer; background: transparent; border: none;
    color: var(--muted); font-size: 9px; padding: 0 5px 0 0;
    vertical-align: middle;
  }
  .expand-btn:hover { color: var(--text); }

  /* Triage */
  .triage-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: .3px;
    margin-bottom: 4px;
  }
  .triage-new       { background: rgba(122,127,153,.12); color: var(--muted); }
  .triage-confirmed { background: rgba(62,207,142,.12);  color: var(--green); }
  .triage-fp        { background: rgba(224,92,106,.12);  color: var(--red);   }
  .triage-actions   { display: flex; gap: 4px; flex-wrap: wrap; }
  .triage-btn {
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    transition: all .15s;
  }
  .triage-btn:hover { color: var(--text); border-color: var(--text); }
  .triage-btn.confirm:hover { color: var(--green); border-color: var(--green); }
  .triage-btn.fp:hover      { color: var(--red);   border-color: var(--red);   }
  tr.row-fp td { opacity: 0.45; }

  /* Filter row */
  tr.filter-row th { padding: 4px 10px 8px; }
  .filter-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    padding: 4px 7px;
    width: 100%;
    outline: none;
    font-family: inherit;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .filter-input:focus { border-color: var(--accent); }

  .no-findings {
    text-align: center;
    padding: 36px;
    color: var(--muted);
    font-style: italic;
    font-size: 13px;
  }

  /* View toggle */
  .view-toggle { display: flex; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px; margin-left: auto; }
  .view-btn { background: transparent; border: none; color: var(--muted); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 4px; cursor: pointer; transition: color .15s; }
  .view-btn.active { background: var(--surface); color: var(--text); }
  .view-btn:hover:not(.active) { color: var(--text); }

  /* Findings layout — list vs tree */
  #findings-layout {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }
  #findings-layout.tree-view { display: flex; }
  .tree-panel {
    display: none;
    width: 260px;
    min-width: 140px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: 580px;
    flex-shrink: 0;
  }
  #findings-layout.tree-view .tree-panel { display: block; }
  #findings-layout.tree-view #findings-table-wrap { flex: 1; overflow: auto; max-height: 580px; }

  /* Tree nodes */
  .tree-list, .tree-children { list-style: none; padding: 0; margin: 0; }
  .tree-children { padding-left: 14px; }
  .tree-node > .tree-children { display: none; }
  .tree-node.open > .tree-children { display: block; }
  .tree-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px 5px 8px;
    cursor: pointer;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .tree-row:hover { background: rgba(255,255,255,.04); }
  .tree-row.selected { background: rgba(91,141,238,.1); border-left-color: var(--accent); }
  .tree-toggle { font-size: 9px; width: 10px; color: var(--muted); flex-shrink: 0; }
  .tree-label { flex: 1; font-family: var(--mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-count { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }

  /* Log panel */
  .log-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .log-status { font-size: 11px; color: var(--muted); margin-left: auto; }
  .log-output {
    background: #0a0c10;
    border-radius: 0 0 var(--radius) var(--radius);
    font-family: var(--mono);
    font-size: 12px;
    height: 420px;
    overflow-y: auto;
    padding: 12px 16px;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
  }
  .log-line-crawl  { color: var(--accent); }
  .log-line-zap    { color: var(--yellow); }
  .log-line-nuclei { color: var(--purple); }
  .log-line-system { color: var(--muted);  font-style: italic; }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    z-index: 999;
    display: none;
    max-width: 340px;
  }
  .toast.show    { display: block; }
  .toast.error   { border-color: var(--red);   color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-state { text-align: center; padding: 60px; color: var(--muted); }
  #error-state   { text-align: center; padding: 60px; color: var(--red); }
</style>
{{template "nav-css" .}}
</head>
<body>
{{template "nav" .}}

<main>
  <a class="back-link" href="/ui/">All Jobs</a>

  <div id="loading-state">Loading job…</div>
  <div id="error-state"  style="display:none"></div>

  <!-- Job detail card — hidden until loaded -->
  <div id="job-card" class="card" style="display:none">
    <div class="job-header">
      <div class="job-header-main">
        <div class="job-url" id="j-url"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <span id="j-status-badge"></span>
          <span id="j-id" style="font-family:var(--mono);font-size:11px;color:var(--muted)"></span>
        </div>
        <div class="job-meta">
          <span><strong id="j-profile"></strong> profile</span>
          <span>Submitted <strong id="j-submitted"></strong></span>
          <span id="j-started-wrap" style="display:none">Started <strong id="j-started"></strong></span>
          <span id="j-completed-wrap" style="display:none">Completed <strong id="j-completed"></strong></span>
        </div>
        <div class="job-tools" id="j-tools"></div>
        <div class="job-error" id="j-error" style="display:none"></div>
      </div>
      <div class="job-actions">
        <button class="btn-ghost btn-sm" id="reparse-btn" onclick="reparse()">Reparse Findings</button>
        <button class="btn-danger btn-sm" id="retrigger-btn" onclick="retrigger()">Re-run</button>
      </div>
    </div>
  </div>

  <!-- Logs panel — hidden until loaded -->
  <div id="logs-section" style="display:none;margin-bottom:20px">
    <div class="section-header">
      <h2>Logs</h2>
      <button id="logs-toggle-btn" class="btn-ghost btn-sm" onclick="toggleLogs()">Connect</button>
      <span class="log-status" id="log-status"></span>
    </div>
    <div id="logs-panel" style="display:none;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div class="log-toolbar">
        <span style="font-size:11px;color:var(--muted)">
          <span style="color:var(--accent)">■</span> crawl &nbsp;
          <span style="color:var(--yellow)">■</span> zap &nbsp;
          <span style="color:var(--purple)">■</span> nuclei
        </span>
        <button class="btn-ghost btn-sm" onclick="clearLogs()" style="margin-left:auto">Clear</button>
      </div>
      <div class="log-output" id="log-output"></div>
    </div>
  </div>

  <!-- Findings section — hidden until loaded -->
  <div id="findings-section" style="display:none">
    <div class="section-header">
      <h2>Findings</h2>
      <span class="count" id="finding-count">0</span>
      <div class="view-toggle">
        <button id="btn-list" class="view-btn active" onclick="setView('list')">List</button>
        <button id="btn-tree" class="view-btn"        onclick="setView('tree')">Tree</button>
        <button id="btn-cwe"  class="view-btn"        onclick="setView('cwe')">CWE</button>
      </div>
    </div>

    <div id="findings-layout">
      <!-- Tree panel (visible in tree view only) -->
      <div class="tree-panel" id="tree-panel">
        <div id="tree-root"></div>
      </div>
      <!-- Findings table -->
      <div id="findings-table-wrap">
        <table id="findings-table">
          <thead>
            <tr>
              <th>Severity</th>
              <th>Title</th>
              <th>URL</th>
              <th>Tool</th>
              <th>CWE</th>
              <th>Description</th>
              <th>Evidence</th>
              <th>Triage</th>
            </tr>
            <tr class="filter-row">
              <th>
                <select class="filter-input" id="ff-sev" onchange="applyFindingFilters()">
                  <option value="">All</option>
                  <option value="critical">Critical</option>
                  <option value="high">High</option>
                  <option value="medium">Medium</option>
                  <option value="low">Low</option>
                  <option value="info">Info</option>
                </select>
              </th>
              <th><input class="filter-input" type="search" id="ff-title" placeholder="Filter title…" oninput="applyFindingFilters()"></th>
              <th><input class="filter-input" type="search" id="ff-url"   placeholder="Filter URL…"   oninput="applyFindingFilters()"></th>
              <th>
                <select class="filter-input" id="ff-tool" onchange="applyFindingFilters()">
                  <option value="">All</option>
                  <option value="zap">ZAP</option>
                  <option value="nuclei">Nuclei</option>
                </select>
              </th>
              <th><input class="filter-input" type="search" id="ff-cwe"  placeholder="e.g. 79"       oninput="applyFindingFilters()"></th>
              <th><input class="filter-input" type="search" id="ff-desc" placeholder="Filter desc…"  oninput="applyFindingFilters()"></th>
              <th><input class="filter-input" type="search" id="ff-ev"   placeholder="Filter…"       oninput="applyFindingFilters()"></th>
              <th>
                <select class="filter-input" id="ff-triage" onchange="applyFindingFilters()">
                  <option value="">All</option>
                  <option value="new">New</option>
                  <option value="confirmed">Confirmed</option>
                  <option value="false_positive">False Positive</option>
                </select>
              </th>
            </tr>
          </thead>
          <tbody id="findings-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

const jobId = new URLSearchParams(location.search).get('id');
let jobData         = null;
let allFindings     = [];
let pollTimer       = null;
let prevToolStatuses = {};
let currentView      = 'list';
let treeRoot         = null;
let cweGroups        = null;
let selectedTreePath = null; // null = all findings (tree view)
let selectedCWE      = null; // null = all findings (cwe view)

// ── Boot ──────────────────────────────────────────────────────────────────────

if (!jobId) {
  showError('No job ID in URL. Add ?id=<uuid> to the address bar.');
} else {
  loadJob().then(() => loadFindings());
}

// ── Job loading ───────────────────────────────────────────────────────────────

async function loadJob() {
  try {
    const resp = await fetch(`/jobs/${jobId}`);
    if (resp.status === 404) { showError('Job not found.'); return; }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    jobData = await resp.json();
    renderJob(jobData);
    schedulePolling();
  } catch (e) {
    showError('Failed to load job: ' + e.message);
  }
}

function renderJob(j) {
  document.title = `${j.target_url} — Web Security Scanner`;

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('job-card').style.display = 'block';
  document.getElementById('logs-section').style.display = 'block';
  document.getElementById('findings-section').style.display = 'block';

  document.getElementById('j-url').textContent = j.target_url;
  document.getElementById('j-id').textContent  = j.job_id;
  document.getElementById('j-status-badge').innerHTML = badge(j.status);
  document.getElementById('j-profile').textContent    = j.scan_profile;
  document.getElementById('j-submitted').textContent  = relativeTime(j.submitted_at);
  document.getElementById('j-submitted').title        = j.submitted_at;

  if (j.started_at) {
    document.getElementById('j-started-wrap').style.display = '';
    document.getElementById('j-started').textContent = relativeTime(j.started_at);
    document.getElementById('j-started').title = j.started_at;
  }
  if (j.completed_at) {
    document.getElementById('j-completed-wrap').style.display = '';
    document.getElementById('j-completed').textContent = relativeTime(j.completed_at);
    document.getElementById('j-completed').title = j.completed_at;
  }

  document.getElementById('j-tools').innerHTML = [
    toolCard('crawl',  j.crawl_status),
    toolCard('zap',    j.zap_status),
    toolCard('nuclei', j.nuclei_status),
  ].join('');

  const errEl = document.getElementById('j-error');
  if (j.error) {
    errEl.textContent = j.error;
    errEl.style.display = 'block';
  } else {
    errEl.style.display = 'none';
  }

  const running = j.status === 'running';
  document.getElementById('retrigger-btn').style.display = running ? 'none' : '';

  // Auto-open and connect logs when the job is running.
  if (running && !logSource) {
    document.getElementById('logs-panel').style.display = 'block';
    document.getElementById('logs-toggle-btn').textContent = 'Disconnect';
    connectLogs();
  }
  document.getElementById('last-refresh').textContent =
    'Updated ' + new Date().toLocaleTimeString();
}

// ── Polling ───────────────────────────────────────────────────────────────────

function schedulePolling() {
  clearInterval(pollTimer);
  if (!jobData || (jobData.status !== 'running')) return;

  prevToolStatuses = {
    crawl:  jobData.crawl_status,
    zap:    jobData.zap_status,
    nuclei: jobData.nuclei_status,
  };

  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(`/jobs/${jobId}`);
      if (!resp.ok) return;
      const updated = await resp.json();
      const toolsChanged =
        prevToolStatuses.crawl  !== updated.crawl_status  ||
        prevToolStatuses.zap    !== updated.zap_status    ||
        prevToolStatuses.nuclei !== updated.nuclei_status;

      jobData = updated;
      renderJob(updated);

      if (toolsChanged) loadFindings();

      if (updated.status !== 'running') {
        clearInterval(pollTimer);
        loadFindings();
      }
    } catch { /* ignore transient errors */ }
  }, 5000);
}

// ── Findings ──────────────────────────────────────────────────────────────────

async function loadFindings() {
  try {
    const resp = await fetch(`/jobs/${jobId}/findings`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allFindings = data.findings || [];
    treeRoot  = buildTree(allFindings);
    cweGroups = buildCWEGroups(allFindings);
    if (currentView === 'tree') renderTreePanel(treeRoot);
    else if (currentView === 'cwe') renderCWEPanel(cweGroups);
    applyFindingFilters();
  } catch (e) {
    document.getElementById('findings-tbody').innerHTML =
      `<tr><td colspan="8" class="no-findings" style="color:var(--red)">Failed to load findings: ${esc(e.message)}</td></tr>`;
  }
}

function applyFindingFilters() {
  const sev    = document.getElementById('ff-sev').value;
  const title  = document.getElementById('ff-title').value.toLowerCase();
  const url    = document.getElementById('ff-url').value.toLowerCase();
  const tool   = document.getElementById('ff-tool').value;
  const cwe    = document.getElementById('ff-cwe').value.toLowerCase().replace('cwe-', '');
  const desc   = document.getElementById('ff-desc').value.toLowerCase();
  const ev     = document.getElementById('ff-ev').value.toLowerCase();
  const triage = document.getElementById('ff-triage').value;

  const filtered = allFindings.filter(f => {
    // Tree path filter
    if (selectedTreePath !== null) {
      try {
        const u  = new URL(f.url);
        const fp = '/' + u.host + u.pathname;
        if (fp !== selectedTreePath && !fp.startsWith(selectedTreePath + '/')) return false;
      } catch { return false; }
    }
    // CWE group filter
    if (selectedCWE !== null) {
      if (selectedCWE === 'none' ? f.cwe != null : f.cwe !== selectedCWE) return false;
    }
    if (sev    && f.severity !== sev)                                           return false;
    if (title  && !f.title.toLowerCase().includes(title))                       return false;
    if (url    && !(f.url   || '').toLowerCase().includes(url))                 return false;
    if (tool   && f.tool !== tool)                                              return false;
    if (cwe    && !(f.cwe ? String(f.cwe) : '').includes(cwe))                 return false;
    if (desc   && !(f.description || '').toLowerCase().includes(desc))          return false;
    if (ev     && !(f.evidence    || '').toLowerCase().includes(ev))            return false;
    if (triage && f.triage_status !== triage)                                   return false;
    return true;
  });

  const countEl = document.getElementById('finding-count');
  countEl.textContent = filtered.length < allFindings.length
    ? `${filtered.length} of ${allFindings.length}`
    : allFindings.length;

  renderFindingRows(filtered);
}

function renderFindingRows(filtered) {
  const tbody = document.getElementById('findings-tbody');

  if (filtered.length === 0) {
    const msg = allFindings.length === 0
      ? 'No findings recorded yet.'
      : 'No findings match the current filters.';
    tbody.innerHTML = `<tr><td colspan="8" class="no-findings">${msg}</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.flatMap(f => {
    const ts = f.triage_status || 'new';
    const tsLabel = ts === 'false_positive' ? 'False Positive' : ts.charAt(0).toUpperCase() + ts.slice(1);
    const tsBadgeCls = ts === 'false_positive' ? 'triage-fp' : ts === 'confirmed' ? 'triage-confirmed' : 'triage-new';
    const rowCls = ts === 'false_positive' ? ' class="row-fp"' : '';
    const isExpanded = expandedFindings.has(f.id);
    const hasDetails = f.details && Object.keys(f.details).length > 0;

    const btnConfirm = ts !== 'confirmed'
      ? `<button class="triage-btn confirm" onclick="triageFinding('${f.id}','confirmed')">✓ Confirm</button>` : '';
    const btnFP = ts !== 'false_positive'
      ? `<button class="triage-btn fp" onclick="triageFinding('${f.id}','false_positive')">✗ FP</button>` : '';
    const btnReset = ts !== 'new'
      ? `<button class="triage-btn" onclick="triageFinding('${f.id}','new')">↺ Reset</button>` : '';

    const mainRow = `<tr${rowCls}>
      <td>
        ${hasDetails ? `<button class="expand-btn" onclick="toggleFindingDetails('${f.id}')">${isExpanded ? '▼' : '▶'}</button>` : ''}
        <span class="sev sev-${f.severity}">${f.severity}</span>
      </td>
      <td>${esc(f.title)}</td>
      <td><span class="url-mono" title="${esc(f.url)}">${esc(f.url)}</span></td>
      <td style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted)">${esc(f.tool)}</td>
      <td>${f.cwe
        ? `<a href="https://cwe.mitre.org/data/definitions/${f.cwe}.html" target="_blank" rel="noopener" style="color:var(--accent);font-size:12px">CWE-${f.cwe}</a>`
        : `<span style="color:var(--muted)">—</span>`}</td>
      <td class="desc-cell">${esc(f.description || '')}</td>
      <td class="evidence-cell" title="${esc(f.evidence || '')}">${esc(f.evidence || '')}</td>
      <td>
        <span class="triage-badge ${tsBadgeCls}">${tsLabel}</span>
        <div class="triage-actions">${btnConfirm}${btnFP}${btnReset}</div>
      </td>
    </tr>`;

    const detailsHTML = isExpanded ? renderDetails(f) : '';
    const detailsRow = detailsHTML
      ? `<tr><td colspan="8" style="padding:0;border-bottom:1px solid var(--border)">${detailsHTML}</td></tr>`
      : '';

    return [mainRow, detailsRow];
  }).join('');
}

// ── Finding details ───────────────────────────────────────────────────────────

const expandedFindings = new Set();

function toggleFindingDetails(id) {
  expandedFindings.has(id) ? expandedFindings.delete(id) : expandedFindings.add(id);
  applyFindingFilters();
}

function renderDetails(f) {
  const d = f.details;
  if (!d || Object.keys(d).length === 0) return '';

  const rows = [];

  // ── ZAP: inline technical fields ──────────────────────────────────────────
  if (d.confidence) {
    rows.push(`<div class="detail-row">
      <span class="detail-label">Confidence</span>
      <span class="sev sev-${confSev(d.confidence)}">${esc(d.confidence)}</span>
    </div>`);
  }
  if (d.method || d.param || d.attack) {
    let tech = '';
    if (d.method) tech += `<span class="detail-kv">Method: <code>${esc(d.method)}</code></span> `;
    if (d.param)  tech += `<span class="detail-kv">Param: <code>${esc(d.param)}</code></span> `;
    if (d.attack) tech += `<span class="detail-kv">Attack: <code>${esc(d.attack)}</code></span>`;
    rows.push(`<div class="detail-row"><span class="detail-label">Request</span>${tech}</div>`);
  }
  if (d.solution) {
    rows.push(`<div class="detail-col">
      <span class="detail-label">Solution</span>
      <p class="detail-text">${esc(d.solution)}</p>
    </div>`);
  }

  // ── Nuclei: CVE / CVSS ────────────────────────────────────────────────────
  if (d.cve_id && d.cve_id.length > 0) {
    const links = d.cve_id.map(c =>
      `<a href="https://nvd.nist.gov/vuln/detail/${esc(c)}" target="_blank" rel="noopener" style="color:var(--accent)">${esc(c)}</a>`
    ).join(' ');
    rows.push(`<div class="detail-row"><span class="detail-label">CVE</span>${links}</div>`);
  }
  if (d.cvss_score) {
    rows.push(`<div class="detail-row"><span class="detail-label">CVSS</span>
      <span style="font-weight:700;font-size:13px;color:${cvssColor(d.cvss_score)}">${d.cvss_score.toFixed(1)}</span>
      ${d.cvss_metrics ? `<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${esc(d.cvss_metrics)}</span>` : ''}
      ${d.epss_score ? `<span style="color:var(--muted);font-size:11px">EPSS ${(d.epss_score * 100).toFixed(1)}%</span>` : ''}
    </div>`);
  }
  if (d.tags && d.tags.length > 0) {
    rows.push(`<div class="detail-row"><span class="detail-label">Tags</span>
      ${d.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')}
    </div>`);
  }
  if (d.remediation) {
    rows.push(`<div class="detail-col">
      <span class="detail-label">Remediation</span>
      <p class="detail-text">${esc(d.remediation)}</p>
    </div>`);
  }
  if (d.matcher_name) {
    rows.push(`<div class="detail-row"><span class="detail-label">Matcher</span>
      <code style="font-family:var(--mono);font-size:11px">${esc(d.matcher_name)}</code>
    </div>`);
  }
  if (d.extracted_results && d.extracted_results.length > 0) {
    rows.push(`<div class="detail-col">
      <span class="detail-label">Extracted</span>
      ${d.extracted_results.map(r => `<code style="font-family:var(--mono);font-size:11px;color:var(--yellow)">${esc(r)}</code>`).join('<br>')}
    </div>`);
  }

  // ── Shared: references ────────────────────────────────────────────────────
  const refs = Array.isArray(d.reference) ? d.reference : (d.reference ? d.reference.split('\n').map(s=>s.trim()).filter(Boolean) : []);
  if (refs.length > 0) {
    const links = refs.map(r => `<a href="${esc(r)}" target="_blank" rel="noopener" style="color:var(--accent);font-size:12px">${esc(r)}</a>`).join('<br>');
    rows.push(`<div class="detail-col"><span class="detail-label">References</span>${links}</div>`);
  }

  // ── Nuclei: curl + request/response ──────────────────────────────────────
  if (d.curl_command) {
    const safeCmd = esc(d.curl_command);
    rows.push(`<div class="detail-col">
      <span class="detail-label">Curl Command
        <button class="copy-btn" onclick="copyToClipboard(${JSON.stringify(d.curl_command)})">Copy</button>
      </span>
      <pre class="detail-code">${safeCmd}</pre>
    </div>`);
  }
  if (d.request) {
    rows.push(`<div class="detail-col">
      <span class="detail-label">Request</span>
      <pre class="detail-code">${esc(d.request)}</pre>
    </div>`);
  }
  if (d.response) {
    rows.push(`<div class="detail-col">
      <span class="detail-label">Response</span>
      <pre class="detail-code">${esc(d.response)}</pre>
    </div>`);
  }

  if (rows.length === 0) return '';
  return `<div class="detail-panel">${rows.join('')}</div>`;
}

function confSev(c) {
  switch ((c || '').toLowerCase()) {
    case 'confirmed': return 'critical';
    case 'high':      return 'high';
    case 'medium':    return 'medium';
    case 'low':       return 'low';
    default:          return 'info';
  }
}

function cvssColor(score) {
  if (score >= 9) return '#ff8090';
  if (score >= 7) return '#f08020';
  if (score >= 4) return 'var(--yellow)';
  return 'var(--green)';
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard', 'success');
  } catch {
    showToast('Copy failed — try selecting manually', 'error');
  }
}

async function triageFinding(findingId, status) {
  try {
    const resp = await fetch(`/jobs/${jobId}/findings/${findingId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ triage_status: status }),
    });
    if (!resp.ok) throw new Error((await resp.json()).error || `HTTP ${resp.status}`);
    const f = allFindings.find(f => f.id === findingId);
    if (f) f.triage_status = status;
    applyFindingFilters();
  } catch (e) {
    showToast('Triage failed: ' + e.message, 'error');
  }
}

// ── Tree view ─────────────────────────────────────────────────────────────────

function setView(view) {
  currentView = view;
  document.getElementById('btn-list').classList.toggle('active', view === 'list');
  document.getElementById('btn-tree').classList.toggle('active', view === 'tree');
  document.getElementById('btn-cwe').classList.toggle('active',  view === 'cwe');

  const layout = document.getElementById('findings-layout');
  layout.classList.toggle('tree-view', view !== 'list');

  if (view === 'tree') {
    selectedCWE = null;
    if (treeRoot) renderTreePanel(treeRoot);
  } else if (view === 'cwe') {
    selectedTreePath = null;
    if (cweGroups) renderCWEPanel(cweGroups);
  } else {
    selectedTreePath = null;
    selectedCWE      = null;
  }
  applyFindingFilters();
}

// Build a trie from the findings URL corpus.
function buildTree(findings) {
  const root = { seg: '', path: '', children: new Map(), findings: [] };
  for (const f of findings) {
    let u;
    try { u = new URL(f.url); } catch { continue; }
    const segs = [u.host, ...u.pathname.split('/').filter(Boolean)];
    let node = root;
    let path = '';
    for (const seg of segs) {
      path += '/' + seg;
      if (!node.children.has(seg)) {
        node.children.set(seg, { seg, path, children: new Map(), findings: [] });
      }
      node = node.children.get(seg);
    }
    node.findings.push(f);
  }
  // Annotate each node with its full subtree findings + highest severity.
  function annotate(node) {
    node.allFindings = [...node.findings];
    for (const child of node.children.values()) {
      annotate(child);
      node.allFindings.push(...child.allFindings);
    }
    node.topSev = ['critical','high','medium','low','info']
      .find(s => node.allFindings.some(f => f.severity === s)) || null;
  }
  annotate(root);
  return root;
}

function renderTreePanel(root) {
  const container = document.getElementById('tree-root');
  container.innerHTML = '';

  // "All" row at top — selects nothing (shows all).
  const allRow = makeTreeRow('', 'All paths', root.allFindings.length, root.topSev, true, false);
  allRow.style.fontStyle = 'italic';
  allRow.querySelector('.tree-label').style.color = 'var(--muted)';
  allRow.addEventListener('click', () => selectTreePath(null));
  container.appendChild(allRow);

  const ul = document.createElement('ul');
  ul.className = 'tree-list';
  for (const child of root.children.values()) {
    ul.appendChild(buildTreeLi(child));
  }
  container.appendChild(ul);
}

function buildTreeLi(node) {
  const li = document.createElement('li');
  li.className = 'tree-node open'; // start expanded

  const hasChildren = node.children.size > 0;
  const row = makeTreeRow(
    node.path, node.seg, node.allFindings.length, node.topSev,
    selectedTreePath === node.path, hasChildren
  );

  row.addEventListener('click', (e) => {
    e.stopPropagation();
    if (hasChildren) {
      li.classList.toggle('open');
      row.querySelector('.tree-toggle').textContent =
        li.classList.contains('open') ? '▾' : '▸';
    }
    selectTreePath(node.path);
  });
  li.appendChild(row);

  if (hasChildren) {
    const ul = document.createElement('ul');
    ul.className = 'tree-children';
    for (const child of node.children.values()) {
      ul.appendChild(buildTreeLi(child));
    }
    li.appendChild(ul);
  }
  return li;
}

function makeTreeRow(path, label, count, topSev, isSelected, hasChildren) {
  const row = document.createElement('div');
  row.className = 'tree-row' + (isSelected ? ' selected' : '');
  row.dataset.path = path;

  const toggleChar = hasChildren ? '▾' : '·';
  const countHtml  = count > 0 && topSev
    ? `<span class="tree-count sev-${topSev}">${count}</span>`
    : (count > 0 ? `<span class="tree-count" style="color:var(--muted)">${count}</span>` : '');

  row.innerHTML =
    `<span class="tree-toggle">${toggleChar}</span>` +
    `<span class="tree-label" title="${esc(path || 'All')}">${esc(label)}</span>` +
    countHtml;
  return row;
}

function selectTreePath(path) {
  selectedTreePath = path;
  document.querySelectorAll('#tree-root .tree-row').forEach(r => {
    const match = path === null ? r.dataset.path === '' : r.dataset.path === path;
    r.classList.toggle('selected', match);
  });
  applyFindingFilters();
}

// ── CWE view ──────────────────────────────────────────────────────────────────

function buildCWEGroups(findings) {
  const map = new Map();
  for (const f of findings) {
    const key = f.cwe != null ? f.cwe : 'none';
    if (!map.has(key)) map.set(key, { cwe: key, findings: [] });
    map.get(key).findings.push(f);
  }

  const sevOrder = { critical: 0, high: 1, medium: 2, low: 3, info: 4 };
  const groups = Array.from(map.values()).map(g => ({
    ...g,
    topSev: ['critical','high','medium','low','info'].find(s => g.findings.some(f => f.severity === s)) || null,
  }));

  groups.sort((a, b) => {
    if (a.cwe === 'none') return 1;
    if (b.cwe === 'none') return -1;
    const sa = sevOrder[a.topSev] ?? 5;
    const sb = sevOrder[b.topSev] ?? 5;
    return sa !== sb ? sa - sb : b.findings.length - a.findings.length;
  });

  return groups;
}

function renderCWEPanel(groups) {
  const container = document.getElementById('tree-root');
  container.innerHTML = '';

  const topSev = ['critical','high','medium','low','info'].find(s => allFindings.some(f => f.severity === s)) || null;
  const allRow = makeTreeRow('', 'All CWEs', allFindings.length, topSev, selectedCWE === null, false);
  allRow.querySelector('.tree-label').style.color      = 'var(--muted)';
  allRow.querySelector('.tree-label').style.fontStyle  = 'italic';
  allRow.addEventListener('click', () => selectCWEGroup(null));
  container.appendChild(allRow);

  const ul = document.createElement('ul');
  ul.className = 'tree-list';
  for (const g of groups) {
    const li    = document.createElement('li');
    li.className = 'tree-node';
    const cweName = g.cwe !== 'none' ? (CWE_NAMES[g.cwe] || '') : '';
    const label   = g.cwe === 'none' ? 'No CWE' : `CWE-${g.cwe}`;
    const display = cweName ? `${label} — ${cweName}` : label;
    const row   = makeTreeRow(String(g.cwe), display, g.findings.length, g.topSev, selectedCWE === g.cwe, false);
    // Override title to show full name on hover (in case it's truncated).
    if (cweName) row.querySelector('.tree-label').title = `${label}: ${cweName}`;
    row.addEventListener('click', () => selectCWEGroup(g.cwe));
    li.appendChild(row);
    ul.appendChild(li);
  }
  container.appendChild(ul);
}

function selectCWEGroup(cwe) {
  selectedCWE = cwe;
  document.querySelectorAll('#tree-root .tree-row').forEach(r => {
    const match = cwe === null ? r.dataset.path === '' : r.dataset.path === String(cwe);
    r.classList.toggle('selected', match);
  });
  applyFindingFilters();
}

// ── Log streaming ─────────────────────────────────────────────────────────────

const MAX_LOG_LINES = 2000; // cap DOM nodes so the page stays responsive

let logSource    = null;
let logBuffer    = [];   // lines waiting to be flushed to the DOM
let logFlushTimer = null;
let logLineCount  = 0;

function toggleLogs() {
  const panel = document.getElementById('logs-panel');
  const btn   = document.getElementById('logs-toggle-btn');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    btn.textContent = 'Disconnect';
    connectLogs();
  } else {
    panel.style.display = 'none';
    btn.textContent = 'Connect';
    disconnectLogs();
  }
}

function connectLogs() {
  disconnectLogs();
  clearLogs();
  setLogStatus('Connecting…');

  logSource = new EventSource(`/jobs/${jobId}/logs`);

  logSource.onopen = () => setLogStatus('Streaming…');

  logSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.done) {
      flushLogBuffer();
      setLogStatus('Stream ended');
      stopFlushTimer();
      logSource.close();
      logSource = null;
      document.getElementById('logs-toggle-btn').textContent = 'Reconnect';
      return;
    }
    logBuffer.push(data);
  };

  logSource.onerror = () => {
    flushLogBuffer();
    setLogStatus('Disconnected');
    stopFlushTimer();
    if (logSource) { logSource.close(); logSource = null; }
    document.getElementById('logs-toggle-btn').textContent = 'Reconnect';
  };

  // Flush buffered lines to the DOM at most every 100 ms so the main
  // thread isn't hammered on high-volume output (ZAP/Nuclei can be noisy).
  logFlushTimer = setInterval(flushLogBuffer, 100);
}

function disconnectLogs() {
  stopFlushTimer();
  if (logSource) { logSource.close(); logSource = null; }
  setLogStatus('');
}

function stopFlushTimer() {
  clearInterval(logFlushTimer);
  logFlushTimer = null;
}

function flushLogBuffer() {
  if (logBuffer.length === 0) return;

  const out = document.getElementById('log-output');
  if (!out) return;

  const atBottom = out.scrollHeight - out.scrollTop - out.clientHeight < 80;

  // Build all new nodes in a fragment — one reflow instead of N.
  const frag = document.createDocumentFragment();
  for (const { tool, text } of logBuffer) {
    const span = document.createElement('span');
    span.className = `log-line-${tool}`;
    span.textContent = `[${tool}] ${text}\n`;
    frag.appendChild(span);
    logLineCount++;
  }
  logBuffer = [];
  out.appendChild(frag);

  // Trim oldest lines to stay under the cap.
  while (logLineCount > MAX_LOG_LINES) {
    out.removeChild(out.firstChild);
    logLineCount--;
  }

  if (atBottom) out.scrollTop = out.scrollHeight;
}

function clearLogs() {
  const out = document.getElementById('log-output');
  if (out) out.innerHTML = '';
  logBuffer   = [];
  logLineCount = 0;
}

function setLogStatus(msg) {
  document.getElementById('log-status').textContent = msg;
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function badge(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}

function toolCard(name, status) {
  const statusCls = `tsb-${status}`;
  const spinner   = status === 'running' ? ' <span class="spinner"></span>' : '';
  const canDl     = status !== 'pending' && status !== 'running';
  const dlLink    = canDl
    ? `<a class="tool-dl" href="/jobs/${jobId}/artifacts/${name}" download title="Download raw output">↓</a>`
    : '';
  return `<div class="tool-card">
    <span class="tool-name tool-name-${name}">${name}</span>
    <span class="tool-status-badge ${statusCls}">${status}${spinner}</span>${dlLink}
  </div>`;
}

function relativeTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60)    return s + 's ago';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  const el = document.getElementById('error-state');
  el.textContent = msg;
  el.style.display = 'block';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 4000);
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
