name: Build web tool images

on:
  push:
    branches:
      - main
    paths:
      - "images/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        tool:
          - web-crawler
          - zap-runner
          - nuclei-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests (web-crawler only)
        if: matrix.tool == 'web-crawler'
        working-directory: images/web-crawler
        run: |
          pip install pytest
          python -m pytest tests/ -v

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.tool }}/
          file: images/${{ matrix.tool }}/Dockerfile
          push: true
          tags: |
            ghcr.io/brian-l-johnson/${{ matrix.tool }}:${{ github.sha }}
            ghcr.io/brian-l-johnson/${{ matrix.tool }}:latest
